name: Update Site

on:
  push:
    branches: main

jobs:
  updatesite:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install Hugo (extended)
        run: |
          brew install hugo
          hugo version
      - name: Install LibreOffice (for resume PDF/DOCX export)
        run: brew install --cask libreoffice
      - name: Generate resume PDF/DOCX
        run: ./scripts/build-resume.sh
      - name: Build site
        run: hugo -D
      - name: Publish generated content to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GITKEN }}
          external_repository: karthick-kk/karthick-kk.github.io
          publish_branch: master
          publish_dir: ./public
